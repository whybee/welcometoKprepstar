<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>KPrepStar — Coming Soon</title>
<meta name="description" content="KPrepStar — Amazon FBA Prep Services. Coming soon." />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,400&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #0b0d10;
    --bg-soft: #11141a;
    --ink: #e8e4d8;
    --ink-dim: #8a8674;
    --accent: #d4a24c;
    --accent-soft: #b8863a;
    --line: rgba(232, 228, 216, 0.12);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--ink);
    font-family: 'Fraunces', Georgia, serif;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    overflow: hidden;
  }

  /* Starfield background */
  .stars {
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(1px 1px at 20% 30%, rgba(232, 228, 216, 0.4), transparent),
      radial-gradient(1px 1px at 60% 70%, rgba(232, 228, 216, 0.3), transparent),
      radial-gradient(1px 1px at 80% 15%, rgba(212, 162, 76, 0.5), transparent),
      radial-gradient(1px 1px at 35% 85%, rgba(232, 228, 216, 0.25), transparent),
      radial-gradient(1px 1px at 90% 50%, rgba(232, 228, 216, 0.3), transparent),
      radial-gradient(1px 1px at 10% 60%, rgba(212, 162, 76, 0.35), transparent),
      radial-gradient(2px 2px at 50% 40%, rgba(232, 228, 216, 0.2), transparent),
      radial-gradient(1px 1px at 75% 92%, rgba(232, 228, 216, 0.3), transparent);
    background-size: 100% 100%;
    z-index: 0;
    animation: twinkle 6s ease-in-out infinite alternate;
  }

  @keyframes twinkle {
    0% { opacity: 0.5; }
    100% { opacity: 1; }
  }

  /* Subtle grain overlay */
  .grain {
    position: fixed;
    inset: 0;
    pointer-events: none;
    opacity: 0.035;
    z-index: 1;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='3'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  }

  /* Glow gradient */
  .glow {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 900px;
    height: 900px;
    max-width: 95vw;
    max-height: 95vw;
    background: radial-gradient(circle, rgba(212, 162, 76, 0.08) 0%, transparent 60%);
    z-index: 1;
    pointer-events: none;
  }

  /* Main container */
  main {
    position: relative;
    z-index: 2;
    min-height: 100vh;
    display: grid;
    grid-template-rows: auto 1fr auto;
    padding: 2.5rem 3rem;
  }

  /* Header */
  header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.72rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--ink-dim);
    animation: fadeIn 1.2s ease-out 0.2s both;
  }

  header .brand-mark {
    display: flex;
    align-items: center;
    gap: 0.6rem;
  }

  header .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 8px var(--accent);
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.6; transform: scale(0.85); }
  }

  /* Hero center */
  .hero {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    gap: 1.5rem;
  }

  .eyebrow {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.72rem;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--accent);
    display: flex;
    align-items: center;
    gap: 1rem;
    animation: fadeUp 1s ease-out 0.4s both;
  }

  .eyebrow::before,
  .eyebrow::after {
    content: "";
    width: 30px;
    height: 1px;
    background: var(--accent);
    opacity: 0.5;
  }

  .brand {
    font-size: clamp(3.2rem, 12vw, 8rem);
    font-weight: 400;
    font-style: italic;
    letter-spacing: -0.02em;
    line-height: 1;
    animation: fadeUp 1.2s ease-out 0.6s both;
  }

  .brand .k {
    color: var(--accent);
    font-style: normal;
    font-weight: 500;
  }

  .brand .star {
    display: inline-block;
    color: var(--accent);
    font-style: normal;
    margin-left: 0.1em;
    animation: rotate 12s linear infinite;
    transform-origin: center;
  }

  @keyframes rotate {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }

  .tagline {
    font-size: clamp(1rem, 2.2vw, 1.35rem);
    font-weight: 300;
    color: var(--ink);
    max-width: 42rem;
    line-height: 1.5;
    font-style: italic;
    animation: fadeUp 1.2s ease-out 0.9s both;
  }

  .tagline-kr {
    font-family: 'JetBrains Mono', monospace;
    font-style: normal;
    font-size: 0.75rem;
    letter-spacing: 0.2em;
    color: var(--ink-dim);
    text-transform: uppercase;
    margin-top: 0.8rem;
    animation: fadeUp 1.2s ease-out 1.1s both;
  }

  .divider {
    width: 1px;
    height: 60px;
    background: linear-gradient(to bottom, transparent, var(--line), transparent);
    margin: 1.5rem 0;
    animation: fadeIn 1.5s ease-out 1.3s both;
  }

  .status {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--ink-dim);
    animation: fadeUp 1.2s ease-out 1.5s both;
  }

  .status span {
    color: var(--ink);
  }

  /* Footer */
  footer {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.68rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--ink-dim);
    animation: fadeIn 1.2s ease-out 1.8s both;
  }

  footer .corners {
    display: flex;
    gap: 2rem;
  }

  /* Animations */
  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Corner ornaments */
  .corner {
    position: fixed;
    width: 40px;
    height: 40px;
    z-index: 3;
    pointer-events: none;
  }
  .corner::before,
  .corner::after {
    content: "";
    position: absolute;
    background: var(--ink-dim);
    opacity: 0.4;
  }
  .corner::before { width: 100%; height: 1px; }
  .corner::after { width: 1px; height: 100%; }

  .corner.tl { top: 1.5rem; left: 1.5rem; }
  .corner.tl::before { top: 0; left: 0; }
  .corner.tl::after { top: 0; left: 0; }

  .corner.tr { top: 1.5rem; right: 1.5rem; }
  .corner.tr::before { top: 0; right: 0; }
  .corner.tr::after { top: 0; right: 0; }

  .corner.bl { bottom: 1.5rem; left: 1.5rem; }
  .corner.bl::before { bottom: 0; left: 0; }
  .corner.bl::after { bottom: 0; left: 0; }

  .corner.br { bottom: 1.5rem; right: 1.5rem; }
  .corner.br::before { bottom: 0; right: 0; }
  .corner.br::after { bottom: 0; right: 0; }

  /* Responsive */
  @media (max-width: 640px) {
    main { padding: 1.5rem; }
    header, footer { font-size: 0.6rem; }
    header .sub, footer .corners { display: none; }
    .corner { width: 24px; height: 24px; }
    .corner.tl, .corner.tr { top: 0.8rem; }
    .corner.bl, .corner.br { bottom: 0.8rem; }
    .corner.tl, .corner.bl { left: 0.8rem; }
    .corner.tr, .corner.br { right: 0.8rem; }
  }
</style>
</head>
<body>
  <div class="stars"></div>
  <div class="glow"></div>
  <div class="grain"></div>

  <span class="corner tl"></span>
  <span class="corner tr"></span>
  <span class="corner bl"></span>
  <span class="corner br"></span>

  <main>
    <header>
      <div class="brand-mark">
        <span class="dot"></span>
        <span>KPrepStar</span>
      </div>
      <div class="sub">Est. 2026</div>
    </header>

    <section class="hero">
      <div class="eyebrow">Coming Soon</div>

      <h1 class="brand">
        <span class="k">K</span>PrepStar<span class="star">✦</span>
      </h1>

      <p class="tagline">
        Amazon FBA Prep Services, crafted for Korean sellers.
      </p>
      <p class="tagline-kr">한국 셀러를 위한 아마존 FBA 프렙 서비스</p>

      <div class="divider"></div>

      <div class="status">
        Launching <span>Soon</span> · Stay Tuned
      </div>
    </section>

    <footer>
      <div>© 2026 KPrepStar</div>
      <div class="corners">
        <span>Seattle · Seoul</span>
      </div>
    </footer>
  </main>
</body>
</html>
